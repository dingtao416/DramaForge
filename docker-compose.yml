services:
  # ── Backend (FastAPI) ──
  backend:
    build:
      context: ./dramaForge_bac
      dockerfile: Dockerfile
    container_name: dramaforge-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - backend-storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Vue + Nginx) ──
  frontend:
    build:
      context: ./dramaForge_web
      dockerfile: Dockerfile
    container_name: dramaforge-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

  # ── Redis (Task Queue) ──
  redis:
    image: redis:7-alpine
    container_name: dramaforge-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  backend-storage:
  redis-data:
